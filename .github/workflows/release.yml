name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            meson \
            ninja-build \
            libgtk-4-dev \
            libsoup-3.0-dev \
            libjson-glib-dev

      - name: Configure
        run: meson setup build --buildtype=release

      - name: Build
        run: ninja -C build

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          cp build/WhisperDrop                       WhisperDrop-${TAG}-linux-x86_64
          cp build/installer/whisperdrop-installer   WhisperDrop-Installer-${TAG}-linux-x86_64
          cp build/installer/whisperdrop-uninstaller WhisperDrop-Uninstaller-${TAG}-linux-x86_64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WhisperDrop-*-linux-x86_64
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libsoup3
            mingw-w64-x86_64-json-glib
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python

      - name: Configure
        run: meson setup build --buildtype=release

      - name: Build
        run: ninja -C build

      - name: Bundle DLLs
        run: |
          TAG=${GITHUB_REF_NAME}
          OUT=WhisperDrop-windows-bundle
          mkdir -p "$OUT" "$OUT/share" "$OUT/lib" "$OUT/share/icons"

          cp build/WhisperDrop.exe                     "$OUT/WhisperDrop.exe"
          cp build/installer/whisperdrop-installer.exe "$OUT/WhisperDrop-Installer.exe"

          # Collect unique mingw64 DLLs from both exes in one pass, then copy each once
          # ldd output format: "libfoo.dll => /mingw64/bin/libfoo.dll (0x...)"
          { ldd "$OUT/WhisperDrop.exe"; ldd "$OUT/WhisperDrop-Installer.exe"; } \
            | grep -i '/mingw64/bin/' \
            | sed 's|.* => \(/mingw64/bin/[^ ]*\).*|\1|' \
            | sort -u \
            | while IFS= read -r src; do
                dll=$(basename "$src")
                cp "$src" "$OUT/$dll" && echo "  + $dll"
              done

          # GTK4 runtime data (schemas, icons, pixbuf loaders)
          [ -d /mingw64/share/glib-2.0 ]      && cp -r /mingw64/share/glib-2.0      "$OUT/share/" || true
          [ -d /mingw64/share/gtk-4.0 ]       && cp -r /mingw64/share/gtk-4.0       "$OUT/share/" || true
          [ -d /mingw64/share/icons/hicolor ]  && cp -r /mingw64/share/icons/hicolor "$OUT/share/icons/" || true
          [ -d /mingw64/lib/gdk-pixbuf-2.0 ]  && cp -r /mingw64/lib/gdk-pixbuf-2.0  "$OUT/lib/"   || true

          # Standalone exe files (no bundled DLLs — for users with MSYS2 already installed)
          cp "$OUT/WhisperDrop.exe"           "WhisperDrop-${TAG}-windows-x86_64.exe"
          cp "$OUT/WhisperDrop-Installer.exe" "WhisperDrop-Installer-${TAG}-windows-x86_64.exe"

      - name: Package bundle zip
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          Compress-Archive -Path "WhisperDrop-windows-bundle\*" `
                           -DestinationPath "WhisperDrop-${tag}-windows-x86_64-bundle.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WhisperDrop-*-windows-x86_64.exe
            WhisperDrop-Installer-*-windows-x86_64.exe
            WhisperDrop-*-windows-x86_64-bundle.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gtk4 libsoup json-glib meson ninja

      - name: Configure
        run: meson setup build --buildtype=release

      - name: Build
        run: ninja -C build

      - name: Rename artifact
        run: |
          TAG=${GITHUB_REF_NAME}
          cp build/WhisperDrop WhisperDrop-${TAG}-macos-x86_64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WhisperDrop-*-macos-x86_64
